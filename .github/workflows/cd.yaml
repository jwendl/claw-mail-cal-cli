name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies (Windows x64)
        run: dotnet restore src/ClawMailCalCli/ClawMailCalCli.csproj --runtime win-x64

      - name: Restore dependencies (Ubuntu x64)
        run: dotnet restore src/ClawMailCalCli/ClawMailCalCli.csproj --runtime linux-x64

      - name: Publish Windows x64
        run: >
          dotnet publish src/ClawMailCalCli/ClawMailCalCli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output publish/win-x64
          -p:PublishSingleFile=true

      - name: Publish Ubuntu x64
        run: >
          dotnet publish src/ClawMailCalCli/ClawMailCalCli.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          --no-restore
          --output publish/linux-x64
          -p:PublishSingleFile=true

      - name: Archive Windows x64 build
        run: zip -j publish/claw-mail-cal-cli-win-x64.zip publish/win-x64/ClawMailCalCli.exe

      - name: Archive Ubuntu x64 build
        run: zip -j publish/claw-mail-cal-cli-linux-x64.zip publish/linux-x64/ClawMailCalCli

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/claw-mail-cal-cli-win-x64.zip
            publish/claw-mail-cal-cli-linux-x64.zip
          generate_release_notes: true
