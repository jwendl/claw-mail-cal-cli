name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore claw-mail-cal-cli.slnx

      - name: Build
        run: dotnet build claw-mail-cal-cli.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/ClawMailCalCli.Tests/ClawMailCalCli.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Check formatting
        run: dotnet format claw-mail-cal-cli.slnx --verify-no-changes
