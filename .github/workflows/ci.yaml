name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore src/ClawMailCalCli/ClawMailCalCli.csproj

      - name: Build
        run: dotnet build src/ClawMailCalCli/ClawMailCalCli.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/ --configuration Release --verbosity normal
