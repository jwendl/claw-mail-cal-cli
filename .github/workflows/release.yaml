name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0, without the v prefix)'
        required: true
        type: string

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Version '${VERSION}' is not a valid semantic version (expected MAJOR.MINOR.PATCH)"
              exit 1
            fi
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Tag '${TAG}' is not a valid semantic version tag (expected vMAJOR.MINOR.PATCH)"
              exit 1
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "::error::Tag '${{ steps.version.outputs.tag }}' already exists on the remote. Bump the version and try again."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ClawMailCalCli/ClawMailCalCli.csproj

      - name: Publish Windows x64
        run: >
          dotnet publish src/ClawMailCalCli/ClawMailCalCli.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -o ./publish/win-x64

      - name: Publish Linux x64
        run: >
          dotnet publish src/ClawMailCalCli/ClawMailCalCli.csproj
          -c Release -r linux-x64 --self-contained true
          -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.version }}
          -o ./publish/linux-x64

      - name: Validate Linux x64 binary
        run: |
          chmod +x ./publish/linux-x64/claw-mail-cal-cli
          echo "Running smoke test: --help"
          ./publish/linux-x64/claw-mail-cal-cli --help
          echo "Running smoke test: --version"
          ./publish/linux-x64/claw-mail-cal-cli --version

      - name: Verify Linux x64 dependencies
        run: |
          echo "Shared library dependencies:"
          deps_output="$(ldd ./publish/linux-x64/claw-mail-cal-cli 2>&1)"
          echo "$deps_output"
          echo ""
          echo "Checking for missing dependencies..."
          if echo "$deps_output" | grep -q "not found"; then
            echo "::error::Missing shared library dependencies detected"
            echo "$deps_output" | grep "not found"
            exit 1
          fi
          echo "All dependencies satisfied"

      - name: Package Linux x64 artifacts
        run: |
          cd publish/linux-x64
          tar -czf ../claw-mail-cal-cli-linux-x64.tar.gz .

      - name: Generate checksums
        run: |
          sha256sum publish/claw-mail-cal-cli-linux-x64.tar.gz > publish/claw-mail-cal-cli-linux-x64.tar.gz.sha256
          sha256sum publish/win-x64/ClawMailCalCli.exe > publish/claw-mail-cal-cli-win-x64.exe.sha256
          echo "Linux x64 checksum:"
          cat publish/claw-mail-cal-cli-linux-x64.tar.gz.sha256
          echo "Windows x64 checksum:"
          cat publish/claw-mail-cal-cli-win-x64.exe.sha256

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section matching this version (between ## [VERSION] and the next ## [ heading or link reference)
          awk "/^## \[$VERSION\]/{found=1; next} found && /^(## \[|\[[^]]+\]:)/{exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          # Fall back to a generic message if no matching section or section has no real entries
          if ! grep -qE '^[[:space:]]*[-*] ' /tmp/release-notes.md \
            && ! grep -qE '^[[:space:]]*[^#[:space:]]' /tmp/release-notes.md; then
            echo "See [CHANGELOG.md](https://github.com/jwendl/claw-mail-cal-cli/blob/main/CHANGELOG.md) for details." \
              > /tmp/release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release-notes.md
          files: |
            publish/win-x64/ClawMailCalCli.exe
            publish/claw-mail-cal-cli-linux-x64.tar.gz
            publish/claw-mail-cal-cli-linux-x64.tar.gz.sha256
            publish/claw-mail-cal-cli-win-x64.exe.sha256
