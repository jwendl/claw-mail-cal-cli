name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ClawMailCalCli/ClawMailCalCli.csproj

      - name: Publish Windows x64
        run: >
          dotnet publish src/ClawMailCalCli/ClawMailCalCli.csproj --no-restore
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true
          -o ./publish/win-x64

      - name: Publish Linux x64
        run: >
          dotnet publish src/ClawMailCalCli/ClawMailCalCli.csproj --no-restore
          -c Release -r linux-x64 --self-contained true
          -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true
          -o ./publish/linux-x64

      - name: Package Ubuntu x64 binary
        run: |
          cd publish/linux-x64
          tar -czf ../ClawMailCalCli-linux-x64.tar.gz ClawMailCalCli

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Extract the content of the [Unreleased] section (between ## [Unreleased] and the next versioned ## heading)
          awk '/^## \[Unreleased\]/{found=1; next} found && /^## \[[0-9]/{exit} found{print}' CHANGELOG.md > /tmp/release-notes.md
          # Fall back to a generic message if the section has no actual entries
          # Treat the section as empty unless it has at least one list item or non-heading/non-whitespace line
          if ! grep -qE '^[[:space:]]*[-*] ' /tmp/release-notes.md \
            && ! grep -qE '^[[:space:]]*[^#[:space:]]' /tmp/release-notes.md; then
            echo "See [CHANGELOG.md](https://github.com/jwendl/claw-mail-cal-cli/blob/main/CHANGELOG.md) for details." \
              > /tmp/release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            publish/win-x64/ClawMailCalCli.exe
            publish/ClawMailCalCli-linux-x64.tar.gz
